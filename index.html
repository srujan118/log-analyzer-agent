<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Log Insights</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(120deg, #232526, #414345);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: #f5f5f5;
}

.container {
    background: #1e1e2f;
    border-radius: 20px;
    padding: 50px;
    max-width: 850px;
    width: 100%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

h1 {
    text-align: center;
    font-size: 2.1em;
    margin-bottom: 10px;
    font-weight: 700;
}

.subtitle {
    text-align: center;
    margin-bottom: 35px;
    color: #bbb;
    font-size: 0.95em;
}

.upload-section {
    background: #2a2a40;
    border-radius: 18px;
    padding: 35px;
    text-align: center;
    border: 2px dashed #555;
    transition: 0.3s;
}

.upload-section:hover {
    border-color: #00ffcc;
}

input[type="file"] {
    display: none;
}

.file-label {
    display: inline-block;
    padding: 14px 35px;
    background: linear-gradient(90deg, #ff758c, #ff7eb3);
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.file-label:hover {
    transform: scale(1.07);
    box-shadow: 0 0 20px rgba(255,118,150,0.6);
}

.file-name {
    margin-top: 15px;
    color: #aaa;
    font-style: italic;
}

button {
    margin-top: 25px;
    padding: 15px 50px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(90deg, #00ffcc, #00bfff);
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,255,204,0.5);
}

button:disabled {
    background: #555;
    cursor: not-allowed;
}

.loading {
    display: none;
    margin-top: 30px;
    text-align: center;
}

.loading.active {
    display: block;
}

.spinner {
    width: 45px;
    height: 45px;
    border: 4px solid #444;
    border-top: 4px solid #00ffcc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.results-section {
    margin-top: 35px;
    display: none;
}

h2 {
    margin-bottom: 15px;
    font-weight: 600;
}

#result {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    white-space: pre-wrap;
    font-family: monospace;
    max-height: 400px;
    overflow-y: auto;
    border-left: 5px solid #00ffcc;
    line-height: 1.6;
}

.error {
    border-left: 5px solid red;
}

.success {
    border-left: 5px solid lime;
}
</style>
</head>

<body>
<div class="container">

<h1>🧠 System Log Insights</h1>
<p class="subtitle">Upload logs and receive structured diagnostic intelligence</p>

<div class="upload-section">
    <label for="logFile" class="file-label">
        📎 Attach Log File
    </label>
    <input type="file" id="logFile" accept=".txt" onchange="displayFileName()" />
    <div class="file-name" id="fileName">No file attached</div>

    <button onclick="uploadLog()" id="analyzeBtn">
        ⚙ Generate Report
    </button>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:15px;">Processing diagnostics...</p>
</div>

<div class="results-section" id="resultsSection">
    <h2>📑 Diagnostic Report</h2>
    <pre id="result"></pre>
</div>

</div>

<script>
function displayFileName() {
    const fileInput = document.getElementById("logFile");
    const fileName = document.getElementById("fileName");

    if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
    } else {
        fileName.textContent = "No file attached";
    }
}

async function uploadLog() {
    const fileInput = document.getElementById("logFile");
    const file = fileInput.files[0];
    const analyzeBtn = document.getElementById("analyzeBtn");
    const loading = document.getElementById("loading");
    const resultsSection = document.getElementById("resultsSection");
    const resultDiv = document.getElementById("result");

    if (!file) {
        alert("Please attach a log file first.");
        return;
    }

    resultDiv.textContent = "";
    resultsSection.style.display = "none";

    analyzeBtn.disabled = true;
    loading.classList.add("active");

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("/analyze", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            resultDiv.textContent = data.analysis;
            resultDiv.className = "success";
            resultsSection.style.display = "block";
        } else {
            resultDiv.textContent = "Error: " + (data.error || "Unknown error occurred");
            resultDiv.className = "error";
            resultsSection.style.display = "block";
        }

    } catch (error) {
        resultDiv.textContent = "Error: " + error.message;
        resultDiv.className = "error";
        resultsSection.style.display = "block";
    } finally {
        analyzeBtn.disabled = false;
        loading.classList.remove("active");
    }
}
</script>

</body>
</html>
